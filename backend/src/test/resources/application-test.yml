# Test profile: in-memory H2 in PostgreSQL compatibility mode, so the
# integration tests need no running database. Activated with
# @ActiveProfiles("test").
spring:
  datasource:
    url: jdbc:h2:mem:dispatchhub-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

dispatchhub:
  jwt:
    # Test-only signing key; never used outside the test JVM.
    secret: dGhpc2lzYXRlc3RzZWNyZXRrZXlmb3JkaXNwYXRjaGh1YmRldmVsb3BtZW50b25seQ==
