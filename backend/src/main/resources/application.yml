server:
  port: 8080

spring:
  application:
    name: dispatchhub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dispatchhub}
    username: ${DB_USERNAME:dispatchhub}
    password: ${DB_PASSWORD:dispatchhub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

dispatchhub:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXRlc3RzZWNyZXRrZXlmb3JkaXNwYXRjaGh1YmRldmVsb3BtZW50b25seQ==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    issuer: ${JWT_ISSUER:dispatchhub-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  fare:
    base-fare: 2.50
    per-km-rate: 1.20
    per-minute-rate: 0.25
    surge-multiplier: 1.0

logging:
  level:
    root: INFO
    com.credx.dispatchhub: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
