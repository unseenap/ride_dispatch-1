server:
  port: 8080

spring:
  application:
    name: dispatchhub

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dispatchhub}
    username: ${DB_USERNAME:dispatchhub}
    password: ${DB_PASSWORD:dispatchhub}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

dispatchhub:
  jwt:
    # No fallback on purpose: startup fails fast if JWT_SECRET is not set,
    # rather than silently signing tokens with a publicly-known dev key.
    # For local development use the dev profile below.
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    # Refresh tokens are opaque single-use values rotated on every refresh.
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000} # 30 days
    issuer: ${JWT_ISSUER:dispatchhub-api}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  fare:
    base-fare: 2.50
    per-km-rate: 1.20
    per-minute-rate: 0.25
    # surge-multiplier is the floor; the effective multiplier scales up to
    # max-surge-multiplier as waiting trips outnumber available drivers
    # (see SurgePricingService). Set them equal to disable surge.
    surge-multiplier: 1.0
    max-surge-multiplier: ${MAX_SURGE_MULTIPLIER:2.5}
  geocoding:
    # Any Nominatim-compatible endpoint works (self-hosted or commercial).
    base-url: ${GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    # Per-IP token bucket on /api/auth/**: burst up to `capacity` requests,
    # refilling at `refill-per-minute` sustained.
    capacity: ${RATE_LIMIT_CAPACITY:10}
    refill-per-minute: ${RATE_LIMIT_REFILL_PER_MINUTE:10}

logging:
  level:
    root: INFO
    com.credx.dispatchhub: ${APP_LOG_LEVEL:INFO}

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Local development only: activate with SPRING_PROFILES_ACTIVE=dev or
# `mvn spring-boot:run -Dspring-boot.run.profiles=dev`.
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: ${SHOW_SQL:true}

dispatchhub:
  jwt:
    secret: ${JWT_SECRET:dGhpc2lzYXRlc3RzZWNyZXRrZXlmb3JkaXNwYXRjaGh1YmRldmVsb3BtZW50b25seQ==}

logging:
  level:
    com.credx.dispatchhub: ${APP_LOG_LEVEL:DEBUG}
    org.hibernate.SQL: DEBUG
